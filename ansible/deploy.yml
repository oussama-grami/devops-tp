---
- name: Deploy devops-tp on Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    app_namespace: devops-tp
    docker_image: "oussemaguerami/devops-tp"
    docker_tag: "{{ lookup('env', 'DOCKER_TAG') }}"

  tasks:

    - name: Show image being deployed
      debug:
        msg: "Deploying image: {{ docker_image }}:{{ docker_tag }}"

    - name: Apply Deployment with correct image
      shell: |
        sed 's|oussemaguerami/devops-tp:1.0.0|{{ docker_image }}:{{ docker_tag }}|g' \
        {{ playbook_dir }}/../k8s/deployment.yml | kubectl apply -f -

    - name: Apply Service
      shell: kubectl apply -f {{ playbook_dir }}/../k8s/service.yml

    - name: Apply Ingress
      shell: kubectl apply -f {{ playbook_dir }}/../k8s/ingress.yml

    - name: Wait for deployment to be ready
      shell: |
        kubectl rollout status deployment/devops-tp-app \
        -n {{ app_namespace }} --timeout=120s
      register: rollout

    - name: Show rollout status
      debug:
        msg: "{{ rollout.stdout }}"

    - name: Get pods status
      shell: kubectl get pods -n {{ app_namespace }}
      register: pods
      changed_when: false

    - name: Show pods
      debug:
        msg: "{{ pods.stdout }}"
